<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MemPalace Live Graph</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/viewer/styles.css">
</head>
<body>
<header class="topbar">
  <h1>MemPalace <span class="accent">Live Graph</span></h1>
  <div class="stats" id="stats">connecting...</div>
</header>

<main class="layout">
  <aside class="left">
    <h2>Search</h2>
    <input id="q" type="search" placeholder="search entities or run a free query..." autocomplete="off">
    <button id="search-btn">Search</button>
    <button id="show-stats" class="secondary">Show Graph Stats</button>
    <h3>Results</h3>
    <ul id="results" class="results"></ul>
  </aside>

  <section class="center">
    <svg id="graph" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="arrow" viewBox="0 -5 10 10" refX="20" refY="0" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,-5L10,0L0,5" fill="#5b6573"></path>
        </marker>
      </defs>
      <g id="edges-layer"></g>
      <g id="nodes-layer"></g>
    </svg>
    <div class="legend">
      <span><i class="dot file"></i>file</span>
      <span><i class="dot function"></i>function</span>
      <span><i class="dot concept"></i>concept</span>
      <span><i class="dot error"></i>error</span>
      <span><i class="dot decision"></i>decision</span>
      <span><i class="dot library"></i>library</span>
      <span><i class="dot person"></i>person</span>
      <span><i class="dot default"></i>other</span>
    </div>
  </section>

  <aside class="right">
    <h2>Detail</h2>
    <div id="detail" class="detail">
      <p class="muted">click a node to see its facts.</p>
    </div>
    <h3>Stream</h3>
    <ul id="stream-log" class="stream-log"></ul>
  </aside>
</main>

<script src="/viewer/app.js"></script>
</body>
</html>
