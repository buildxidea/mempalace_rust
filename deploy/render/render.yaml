services:
  - type: web
    name: mempalace
    runtime: docker
    plan: starter
    dockerfilePath: ./deploy/render/Dockerfile
    dockerContext: .
    healthCheckPath: /mpr/livez
    autoDeploy: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: "3111"
    command: /usr/local/bin/entrypoint.sh mpr serve